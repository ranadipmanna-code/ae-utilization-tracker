# Force a light base theme so st.data_editor (glide-data-grid) renders light
# instead of its built-in dark palette. The app's own CSS handles the rest,
# and the in-app Light/Dark toggle still restyles everything around the grid.
[theme]
base = "light"
primaryColor = "#0071e3"
backgroundColor = "#f5f5f7"
secondaryBackgroundColor = "#ffffff"
textColor = "#1d1d1f"
font = "sans serif"
